<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<title>핏코치 — AI 운동·영양 코치</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Noto Sans KR',sans-serif;background:#0c0e14;color:#e8eaf2;min-height:100dvh;display:flex;flex-direction:column;font-size:14px;-webkit-tap-highlight-color:transparent}
:root{--bg:#0c0e14;--sf:#141720;--s2:#1c2030;--s3:#232740;--br:#252836;--b2:#2e3350;--tx:#e8eaf2;--mu:#5a6080;--mu2:#8892b0;--gr:#22c55e;--gd:#166534;--gb:#0d2018;--or:#f97316;--ob:#1c1008;--bl:#60a5fa;--bb:#0d1a30;--pu:#a78bfa;--pb:#150f2a;--re:#f87171;--rb:#1c0d0d;--ye:#fbbf24}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
textarea::placeholder,input::placeholder{color:#2e3350}
button{font-family:'DM Sans','Noto Sans KR',sans-serif;cursor:pointer}
@keyframes bop{0%,80%,100%{transform:scale(.75);opacity:.4}40%{transform:scale(1.2);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .25s ease forwards}
.auth-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px}
.auth-screen.active{display:flex}
.auth-logo{width:52px;height:52px;background:var(--gr);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.auth-title{font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:6px;text-align:center}
.auth-sub{font-size:13px;color:var(--mu2);text-align:center;line-height:1.6;margin-bottom:24px;max-width:280px}
.auth-box{width:100%;max-width:340px;background:var(--sf);border:1px solid var(--br);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:14px}
.auth-field{display:flex;flex-direction:column;gap:6px}
.auth-label{font-size:11px;font-weight:500;color:var(--mu);letter-spacing:.06em;text-transform:uppercase}
.auth-input{background:var(--s2);border:1px solid var(--br);border-radius:10px;padding:10px 12px;color:var(--tx);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;width:100%}
.auth-input:focus{border-color:var(--gr)}
.auth-btn{padding:11px;background:var(--gr);border:none;border-radius:10px;color:#0c0e14;font-size:14px;font-weight:600;transition:all .15s;width:100%}
.auth-btn:disabled{opacity:.35;cursor:not-allowed}
.auth-btn:not(:disabled):hover{opacity:.88}
.auth-btn.sec{background:transparent;border:1px solid var(--br);color:var(--mu2);font-weight:400;font-size:13px}
.auth-btn.sec:hover{border-color:var(--b2);color:var(--tx)}
.auth-err{font-size:12px;color:var(--re);text-align:center;display:none;line-height:1.5}
.auth-hint{font-size:11px;color:var(--mu);line-height:1.5}
.auth-hint a{color:var(--bl);text-decoration:none}
.auth-div{height:1px;background:var(--br)}
.sp{width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:#0c0e14;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
#app{display:none;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;width:100%}
.header{height:52px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--br);flex-shrink:0;background:var(--bg)}
.logo-mark{width:30px;height:30px;background:var(--gr);border-radius:9px;display:flex;align-items:center;justify-content:center}
.app-name{font-weight:600;font-size:15px;letter-spacing:-.01em}
.user-badge{font-size:10px;background:var(--gb);color:var(--gr);padding:2px 8px;border-radius:20px;font-weight:500;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab-bar{display:flex;gap:2px;background:var(--sf);padding:3px;border-radius:10px;border:1px solid var(--br)}
.tab-btn{padding:5px 10px;border-radius:7px;border:none;font-size:12px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:4px;background:transparent;color:var(--mu)}
.tab-btn.active{background:var(--s3);color:var(--tx)}
.icon-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--br);background:transparent;color:var(--mu);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.icon-btn:hover{border-color:var(--b2);color:var(--tx)}
#chat-tab{flex:1;display:flex;flex-direction:column;overflow:hidden}
.msg-list{flex:1;overflow-y:auto;padding:14px 14px 6px;display:flex;flex-direction:column;gap:10px}
.msg-row{display:flex;gap:8px;align-items:flex-start;animation:fadeIn .2s ease}
.msg-row.user{justify-content:flex-end}
.avatar{width:28px;height:28px;background:var(--gr);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.bubble{max-width:76%;padding:9px 13px;border-radius:3px 12px 12px 12px;background:var(--sf);border:1px solid var(--br);line-height:1.65;white-space:pre-wrap;font-size:13.5px}
.bubble.user{border-radius:12px 3px 12px 12px;background:var(--gb);border-color:#1e3a1e}
.bubble img{width:100%;max-width:180px;border-radius:8px 8px 0 0;display:block;margin:-9px -13px 6px -13px;border-bottom:1px solid var(--br)}
.typing{padding:10px 13px;background:var(--sf);border:1px solid var(--br);border-radius:3px 12px 12px 12px}
.dot-row{display:flex;gap:5px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gr);animation:bop .9s ease-in-out infinite}
.chips{padding:0 14px 8px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0}
.chip{padding:5px 11px;border-radius:20px;border:1px solid var(--br);background:transparent;color:var(--mu);font-size:11px;white-space:nowrap;flex-shrink:0;transition:all .15s}
.chip:hover{border-color:var(--gr);color:var(--gr)}
.chip.cam:hover{border-color:var(--or);color:var(--or)}
.img-preview{padding:0 14px 8px;display:flex;align-items:center;gap:10px}
.ipt{position:relative}
.ipt img{width:56px;height:56px;object-fit:cover;border-radius:10px;border:2px solid var(--or);display:block}
.ipt-del{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;background:var(--re);border:2px solid var(--bg);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;padding:0}
.input-area{padding:0 14px 14px;flex-shrink:0}
.input-wrap{display:flex;gap:6px;background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:4px 4px 4px 12px;align-items:flex-end;transition:border-color .15s}
.input-wrap:focus-within{border-color:var(--b2)}
.cam-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--b2);background:var(--s2);color:var(--mu);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.cam-btn:hover{background:var(--ob);border-color:var(--or);color:var(--or)}
.msg-input{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-size:13.5px;resize:none;line-height:1.5;padding:6px 0;font-family:inherit;max-height:100px;min-height:34px}
.send-btn{width:34px;height:34px;border-radius:9px;border:none;background:var(--s3);color:var(--mu);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn.active{background:var(--gr);color:#0c0e14}
.scroll-tab{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.card{background:var(--sf);border:1px solid var(--br);border-radius:16px;padding:14px}
.sec-lbl{font-size:10px;font-weight:500;color:var(--mu);letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-card{background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:13px 12px}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-.02em}
.stat-unit{font-size:11px;color:var(--mu);font-weight:400;margin-left:2px}
.stat-lbl{font-size:10px;color:var(--mu);margin-bottom:5px}
.bar-row{display:flex;gap:6px;justify-content:space-between}
.bar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bar-sub{font-size:9px;color:var(--mu);height:14px;display:flex;align-items:flex-end}
.bar-bg{width:100%;height:64px;display:flex;align-items:flex-end}
.bar-fill{width:100%;border-radius:4px 4px 0 0;transition:height .7s cubic-bezier(.34,1.56,.64,1)}
.bar-lbl{font-size:10px;font-weight:500}
.ring-wrap{position:relative;flex-shrink:0}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.pr-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--br)}
.pr-row:last-child{border:none}
.nut-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.nut-card{background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:14px 10px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.food-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--br)}
.food-row:last-child{border:none}
.food-thumb{width:48px;height:48px;border-radius:10px;object-fit:cover;flex-shrink:0;border:1px solid var(--br)}
.food-ph{width:48px;height:48px;border-radius:10px;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nut-tag{font-size:10px;padding:1px 6px;border-radius:4px}
.empty-state{text-align:center;padding:28px 0}
.empty-btn{padding:8px 18px;border-radius:10px;border:1px solid var(--gr);background:transparent;color:var(--gr);font-size:13px}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="screen-login" class="auth-screen">
  <div class="auth-logo"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0c0e14" stroke-width="2.5" stroke-linecap="round"><path d="M6 4v16M18 4v16M3 8h18M3 16h18"/></svg></div>
  <h1 class="auth-title">핏코치</h1>
  <p class="auth-sub">로그인하고 나의 기록을 확인해요</p>
  <div class="auth-box">
    <div class="auth-field"><label class="auth-label">이메일</label><input class="auth-input" id="login-email" type="email" placeholder="example@company.com" autocomplete="email"></div>
    <div class="auth-field"><label class="auth-label">비밀번호</label><input class="auth-input" id="login-pw" type="password" placeholder="비밀번호 입력" autocomplete="current-password"></div>
    <p class="auth-err" id="login-err"></p>
    <button class="auth-btn" id="login-btn">로그인</button>
    <div class="auth-div"></div>
    <button class="auth-btn sec" onclick="showScreen('screen-signup')">계정이 없어요 → 회원가입</button>
  </div>
</div>

<!-- 회원가입 -->
<div id="screen-signup" class="auth-screen">
  <div class="auth-logo"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0c0e14" stroke-width="2.5" stroke-linecap="round"><path d="M6 4v16M18 4v16M3 8h18M3 16h18"/></svg></div>
  <h1 class="auth-title">회원가입</h1>
  <p class="auth-sub">계정을 만들어 나만의 기록을 시작해요</p>
  <div class="auth-box">
    <div class="auth-field"><label class="auth-label">이름 (닉네임)</label><input class="auth-input" id="signup-name" type="text" placeholder="홍길동" autocomplete="name"></div>
    <div class="auth-field"><label class="auth-label">이메일</label><input class="auth-input" id="signup-email" type="email" placeholder="example@company.com" autocomplete="email"></div>
    <div class="auth-field"><label class="auth-label">비밀번호 (6자 이상)</label><input class="auth-input" id="signup-pw" type="password" placeholder="비밀번호 입력" autocomplete="new-password"></div>
    <p class="auth-err" id="signup-err"></p>
    <button class="auth-btn" id="signup-btn">가입하기</button>
    <div class="auth-div"></div>
    <button class="auth-btn sec" onclick="showScreen('screen-login')">이미 계정이 있어요 → 로그인</button>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="logo-mark"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#0c0e14" stroke-width="2.5" stroke-linecap="round"><path d="M6 4v16M18 4v16M3 8h18M3 16h18"/></svg></div>
      <span class="app-name">핏코치</span>
      <span class="user-badge" id="user-badge">로딩중</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>채팅</button>
        <button class="tab-btn" data-tab="nutrition" onclick="switchTab('nutrition')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>영양</button>
        <button class="tab-btn" data-tab="workout" onclick="switchTab('workout')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 4v16M18 4v16M3 8h18M3 16h18"/></svg>운동</button>
        <button class="tab-btn" data-tab="inbody" onclick="switchTab('inbody')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>인바디</button>
      </div>
      <button class="icon-btn" onclick="doSignOut()" title="로그아웃"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
  <div id="chat-tab">
    <div class="msg-list" id="msg-list"></div>
    <div class="img-preview" id="img-preview" style="display:none">
      <div class="ipt"><img id="img-prev-img" src="" alt=""><button class="ipt-del" onclick="cancelImg()">✕</button></div>
      <span style="font-size:12px;color:var(--or);line-height:1.4">음식 사진 첨부됨<br><span style="color:var(--mu)">전송하면 칼로리를 분석해줄게</span></span>
    </div>
    <div class="chips">
      <button class="chip cam" onclick="document.getElementById('file-input').click()">📷 음식 사진 분석</button>
      <button class="chip" onclick="setInput('이번 주 루틴 짜줘')">이번 주 루틴 짜줘</button>
      <button class="chip" onclick="setInput('오늘 영양 요약해줘')">오늘 영양 요약해줘</button>
      <button class="chip" onclick="setInput('스쿼트 자세 알려줘')">스쿼트 자세 알려줘</button>
    </div>
    <div class="input-area">
      <div class="input-wrap">
        <button class="cam-btn" onclick="document.getElementById('file-input').click()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
        <textarea class="msg-input" id="msg-input" rows="1" placeholder="운동 기록하거나 질문해봐" onkeydown="handleKey(event)" oninput="autoResize(this);updateSendBtn()"></textarea>
        <button class="send-btn" id="send-btn" onclick="send()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
    </div>
    <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handleFile(event)">
  </div>
  <div id="nutrition-tab" class="scroll-tab" style="display:none"></div>
  <div id="workout-tab" class="scroll-tab" style="display:none"></div>
  <div id="inbody-tab" class="scroll-tab" style="display:none"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut as fbSignOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fbApp = initializeApp({apiKey:"AIzaSyB6RH_zNuyLlm3Hh1tBSBZsYHxiLYUQQvo",authDomain:"fitcoach-96d39.firebaseapp.com",projectId:"fitcoach-96d39",storageBucket:"fitcoach-96d39.firebasestorage.app",messagingSenderId:"468530084824",appId:"1:468530084824:web:1c2eb2dcb1814a75ac10ad"});
const auth = getAuth(fbApp);
const fdb  = getFirestore(fbApp);

const C={bg:'#0c0e14',sf:'#141720',s2:'#1c2030',s3:'#232740',br:'#252836',b2:'#2e3350',tx:'#e8eaf2',mu:'#5a6080',mu2:'#8892b0',gr:'#22c55e',gd:'#166534',gb:'#0d2018',or:'#f97316',ob:'#1c1008',bl:'#60a5fa',bb:'#0d1a30',pu:'#a78bfa',pb:'#150f2a',re:'#f87171',rb:'#1c0d0d',ye:'#fbbf24'};
function makeDateStr(year,month1,day){return year+'-'+String(month1).padStart(2,'0')+'-'+String(day).padStart(2,'0');}
const todayStr=()=>{const t=new Date();return makeDateStr(t.getFullYear(),t.getMonth()+1,t.getDate());};
const getWeek=()=>Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return makeDateStr(d.getFullYear(),d.getMonth()+1,d.getDate());});
const DAY=['일','월','화','수','목','금','토'];
const DAY_FULL=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function fileToBase64(f){return new Promise((r,j)=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(',')[1]);rd.onerror=j;rd.readAsDataURL(f);});}
function fmtSec(sec){const m=Math.floor(sec/60),s=sec%60;return m+':'+String(s).padStart(2,'0');}

// ── 상태 ──────────────────────────────────────────────────────
let currentUser=null;
let busy=false,scanning=false,pendingImg=null;
let msgs=[],sessions=[],foodToday=[],foodAll=[],prs={},weekVol={},userProfile=null;
let monthPlan={};
let activeDayKey=null,activeExIdx=null,setTimer=null,setStart=null,doneSet=0;
const GOAL_KCAL=()=>userProfile?.goal==='fat_loss'?1800:userProfile?.goal==='strength'?2800:2200;
const GOAL_PROT=()=>userProfile?.goal==='hypertrophy'?160:130;
const MUSCLE_LABELS=['가슴','등','하체','어깨','팔','전신','스트레칭','휴식'];

// ── 화면 전환 ─────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.auth-screen').forEach(el=>el.classList.remove('active'));
  document.getElementById('app').style.display='none';
  if(id==='app') document.getElementById('app').style.display='flex';
  else document.getElementById(id).classList.add('active');
}
window.showScreen=showScreen;

// ── 인증 바인딩 ───────────────────────────────────────────────
function bindAuth(){
  const lb=document.getElementById('login-btn');
  lb.onclick=async()=>{
    const email=document.getElementById('login-email').value.trim();
    const pw=document.getElementById('login-pw').value;
    const err=document.getElementById('login-err');
    err.style.display='none';

async function detectAndSaveProfile(text){

  const gm={'근비대':'hypertrophy','근력':'strength','체중감량':'fat_loss','다이어트':'fat_loss'};
  const lm={'초보':'beginner','입문':'beginner','중급':'intermediate','고급':'advanced'};
  for(const[k,v]of Object.entries(gm))if(text.includes(k)&&!cur.goal){cur.goal=v;upd=true;}
  for(const[k,v]of Object.entries(lm))if(text.includes(k)&&!cur.level){cur.level=v;upd=true;}
  const timeM=text.match(/(\d+)\s*(분|시간)/);
  if(timeM&&!cur.workoutTime){cur.workoutTime=timeM[0];upd=true;}
  if(!cur.workoutPlace){
    if(text.includes('헬스장')){cur.workoutPlace='헬스장';upd=true;}
    else if(text.includes('홈트')||(text.includes('집')&&text.includes('운동'))){cur.workoutPlace='집';upd=true;}
  }
  const chgTime=text.match(/(\d+\s*(?:분|시간))\s*(?:으로|로)\s*변경/);
  if(chgTime){cur.workoutTime=chgTime[1];upd=true;}
  const chgPlace=text.match(/(헬스장|집)\s*(?:으로|로)\s*변경/);
  if(chgPlace){cur.workoutPlace=chgPlace[1];upd=true;}
  if(upd){await setDoc(doc(fdb,'users',currentUser.uid),cur,{merge:true});userProfile=cur;}
}

function parseWorkout(text){
  const pat=/([가-힣a-zA-Z ]+?)\s+(\d+(?:\.\d+)?)\s*kg\s*[×x×]\s*(\d+)\s*회\s*[×x×]\s*(\d+)\s*세트/gi;
  const out=[];let m;while((m=pat.exec(text))!==null)out.push({name:m[1].trim(),weight:+m[2],reps:+m[3],sets:+m[4]});
  return out;
}
const calcVol=exs=>exs.reduce((s,e)=>s+e.weight*e.reps*e.sets,0);
function extractJson(text){
  try{const m=text.match(/```json\s*([\s\S]+?)```/);if(m)return JSON.parse(m[1].trim());}catch{}
  try{const m=text.match(/```\s*(\{[\s\S]+?\})\s*```/);if(m)return JSON.parse(m[1].trim());}catch{}
  try{const m=text.match(/\{[^{}]*"kcal"[^{}]*\}/);if(m)return JSON.parse(m[0]);}catch{}
  try{const lines=text.trim().split('\n');for(let i=lines.length-1;i>=0;i--){const l=lines[i].trim();if(l.startsWith('{')&&l.endsWith('}'))return JSON.parse(l);}}catch{}
  return null;
}

// 날짜 문자열 안전 생성 (위에서 이미 정의됨)
function localToday(){const t=new Date();return makeDateStr(t.getFullYear(),t.getMonth()+1,t.getDate());}

// 텍스트에서 날짜 추출 — "N월 M일" 또는 "N/M" 형식
function extractDateStr(text){
  const y=new Date().getFullYear();
  const m1=text.match(/(\d{1,2})월\s*(\d{1,2})일/);
  if(m1) return makeDateStr(y,parseInt(m1[1]),parseInt(m1[2]));
  const m2=text.match(/(\d{1,2})\/(\d{1,2})(?:\s*[\(（][가-힣]{1,3}[\)）])?/);
  if(m2) return makeDateStr(y,parseInt(m2[1]),parseInt(m2[2]));
  return null;
}

async function parseAndSaveRoutineFromChat(text,dateStr){
  const lines=text.split('\n');
  const items=[];
  for(const line of lines){
    const raw=line.trim();
    if(!raw||raw.length<3) continue;
    // 헤더/섹션/날짜 라인 제외
    if(raw.startsWith('---')||raw.startsWith('===')||raw.match(/^\d{1,2}\/\d{1,2}/)||
       raw.match(/^\[.+\]/)||raw.includes('루틴')||raw.includes('워밍업')||
       raw.includes('마무리')||raw.includes('세트당')||raw.includes('세트 간')||
       raw.includes('이렇게')||raw.includes('이대로')||raw.includes('가자')||
       raw.includes('어때')||raw.includes('무게는')||raw.includes('휴식은')) continue;

    const cleaned=raw.replace(/^\s*[\d]+[.)]\s*/,'').replace(/^\s*[-*•]\s*/,'').trim();
    if(!cleaned||cleaned.length<2) continue;

    const m1=cleaned.match(/^([^|]+?)\s*\|\s*(\d+)\s*세트/);
    const m2=cleaned.match(/^([가-힣a-zA-Z()\s]+?)\s+(\d+)\s*세트/);
    const m=m1||m2;
    if(m){
      const name=m[1].trim().replace(/\s+/g,' ');
      const sets=parseInt(m[2]);
      if(name&&sets&&sets<=20&&name.length>=2&&!name.match(/^\d/)&&!name.includes('/')&&!name.includes('루틴')){
        items.push({name,sets,doneTime:null});
      }
    }
  }
  if(items.length>0){
    if(!monthPlan[dateStr])monthPlan[dateStr]={muscle:'',routines:[],done:false,totalTime:null};
    monthPlan[dateStr].routines=items;
    monthPlan[dateStr].done=false;
    monthPlan[dateStr].totalTime=null;
    await saveMonthPlan();
    const wTab=document.getElementById('workout-tab');
    if(wTab&&wTab.style.display!=='none'){
      const row=document.getElementById('day-row-'+dateStr);
      if(row){const lb=row.querySelector('.muscle-label');if(lb&&monthPlan[dateStr].muscle)lb.textContent=monthPlan[dateStr].muscle;const b=row.querySelector('.done-badge');if(b)b.remove();}
      if(activeDayKey===dateStr){activeExIdx=null;doneSet=0;clearInterval(setTimer);setTimer=null;renderDayPanel(dateStr);}
    }
    return true;
  }
  return false;
}

async function detectAndSaveRoutineFromChat(reply,userText){
  if(!reply.includes('세트')) return false; // 루틴 아니면 스킵

  let dateStr=null;
  const today=localToday();
  const t=new Date();t.setDate(t.getDate()+1);
  const tomorrow=makeDateStr(t.getFullYear(),t.getMonth()+1,t.getDate());

  // 1순위: 사용자 메시지에서 날짜
  dateStr=extractDateStr(userText);

  // 2순위: "내일/오늘" 키워드
  if(!dateStr){
    if(userText.includes('내일')) dateStr=tomorrow;
    else if(userText.includes('오늘')||userText.includes('루틴')||userText.includes('짜줘')) dateStr=today;
  }

  // 3순위: Claude 응답 줄별 날짜 감지 (오늘 제외)
  if(!dateStr){
    for(const line of reply.split('\n')){
      const d=extractDateStr(line);
      if(d&&d!==today){dateStr=d;break;}
    }
  }

  if(!dateStr) return false;

  // 부위 감지
  const mm=(userText+' '+reply).match(/가슴|등|하체|어깨|팔|전신|스트레칭/);
  if(mm){
    if(!monthPlan[dateStr])monthPlan[dateStr]={muscle:'',routines:[],done:false,totalTime:null};
    if(!monthPlan[dateStr].muscle) monthPlan[dateStr].muscle=mm[0];
  }

  const saved=await parseAndSaveRoutineFromChat(reply,dateStr);
  if(saved){
    const wTab=document.getElementById('workout-tab');
    if(wTab&&wTab.style.display!=='none') await renderWorkoutTab();
  }
  return saved;
}

// ── API 호출 ─────────────────────────────────────────────────
// DEPLOY_MODE = true  → Vercel 프록시 경유 (GitHub 배포용)
// DEPLOY_MODE = false → 브라우저 직접 호출 (로컬 테스트용)
const DEPLOY_MODE = true;
const API_KEY_LOCAL = ''; // 로컬 테스트 시 여기에 sk-ant-... 입력

async function fetchClaude(body){
  if(DEPLOY_MODE){
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok){let d='';try{const e=await res.json();d=e?.error?.message||'';}catch{}throw new Error(res.status+(d?' — '+d:''));}
    return (await res.json()).content?.[0]?.text||'응답 오류';
  } else {
    const key=API_KEY_LOCAL||localStorage.getItem('fc:apikey')||'';
    if(!key) throw new Error('API 키를 API_KEY_LOCAL에 입력해줘');
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':true},
      body:JSON.stringify(body)});
    if(!res.ok){let d='';try{const e=await res.json();d=e?.error?.message||'';}catch{}throw new Error(res.status+(d?' — '+d:''));}
    return (await res.json()).content?.[0]?.text||'응답 오류';
  }
}

async function callAPI(messages,system){
  const norm=messages.map(m=>({role:m.role,content:Array.isArray(m.content)?m.content.filter(b=>b.type==='text').map(b=>b.text).join('\n')||(m.imgPrev?'(사진)':''):(m.content||'')})).filter(m=>m.content.trim());
  return fetchClaude({model:'claude-sonnet-4-5',max_tokens:1000,system,messages:norm});
}
async function callAPIImg(textMsgs,imageMsg,system){
  const messages=[...textMsgs.slice(-6).map(m=>({role:m.role,content:String(m.content||'')})),imageMsg];
  return fetchClaude({model:'claude-sonnet-4-5',max_tokens:2000,system,messages});
}

// ── 전송 ─────────────────────────────────────────────────────
async function send(){
  const txt=document.getElementById('msg-input').value.trim();
  if((!txt&&!pendingImg)||busy)return;
  document.getElementById('msg-input').value='';
  autoResize(document.getElementById('msg-input'));
  updateSendBtn();setBusy(true);
  if(pendingImg){
    scanning=true;
    const caption=(txt||'이 음식 사진을 분석해줘')+'\n\n반드시 응답 마지막에 아래 형식의 JSON 블록을 포함해줘:\n```json\n{"name":"음식명","portion":"약XXXg","kcal":숫자,"prot":숫자,"carb":숫자,"fat":숫자,"fiber":숫자}\n```';
    const displayCaption=txt||'이 음식 사진을 분석해줘';
    addMsg('user',displayCaption,pendingImg.prev);showTyping(true);
    const imgDataUrl='data:'+pendingImg.mime+';base64,'+pendingImg.b64;
    try{
      const reply=await callAPIImg(msgs.filter(m=>!m.imgPrev),{role:'user',content:[{type:'image',source:{type:'base64',media_type:pendingImg.mime,data:pendingImg.b64}},{type:'text',text:caption}]},buildSysFood());
      const fd=extractJson(reply);
      if(fd){await saveFoodLog(fd,imgDataUrl);await loadAll();renderNutritionTab();}
      else console.warn('[핏코치] JSON 파싱 실패. 응답 원문:',reply);
      hideTyping();addMsg('assistant',reply);
    }catch(e){hideTyping();addMsg('assistant','분석 오류: '+e.message);}
    scanning=false;cancelImg();
  } else {
    const parsed=parseWorkout(txt);
    addMsg('user',txt);showTyping(false);
    try{
      const reply=await callAPI(msgs.slice(-20),buildSysChat());
      if(parsed.length>0){await saveSession(parsed);await loadAll();}
      await detectAndSaveProfile(txt+reply);
      const routineSaved=await detectAndSaveRoutineFromChat(reply,txt);
      hideTyping();addMsg('assistant',reply);
      if(routineSaved){
        setTimeout(()=>{
          const savedDateMatch=(txt+reply).match(/(\d{1,2})월\s*(\d{1,2})일/);
          const label=savedDateMatch?savedDateMatch[0]:'해당 날짜';
          addMsg('assistant','✅ '+label+' 루틴이 운동 탭에 저장됐어! 운동 탭에서 확인해봐.');
        },300);
      }
      // 운동 자세 질문 감지 → 이미지 검색
      const poseKw=extractExerciseName(txt);
      if(poseKw){
        setTimeout(()=>addExerciseImages(poseKw),500);
      }
    }catch(e){hideTyping();addMsg('assistant','오류: '+e.message+'\n\n• API 키 확인\n• Anthropic 크레딧 확인');}
  }
  setBusy(false);
  setTimeout(()=>document.getElementById('msg-input').focus(),100);
  // 대화 내용 자동 저장 (백그라운드)
  saveChatLog().catch(()=>{});
}
window.send=send;

function extractExerciseName(text){
  const poseWords=['자세','방법','하는 법','어떻게','폼','알려줘','알려줄','설명','운동법'];
  const hasPose=poseWords.some(w=>text.includes(w));
  if(!hasPose) return null;
  const exMatch=text.match(/([가-힣a-zA-Z]+(?:[\s\-][가-힣a-zA-Z]+)?)\s*(?:자세|방법|폼|하는\s*법|알려|어떻게|운동\s*방법|운동법)/);
  if(!exMatch) return null;
  const name=exMatch[1].trim();
  if(name.length<2||['운동','오늘','어떤','어느','이','그','저'].includes(name)) return null;
  return name;
}

async function loadExerciseDB(){
  if(exerciseDB) return exerciseDB;
  if(exerciseDBLoading) return null;
  exerciseDBLoading=true;
  try{
    const res=await fetch(EXDB_URL);
    if(!res.ok) throw new Error('DB 로드 실패');
    exerciseDB=await res.json();
    return exerciseDB;
  }catch(e){
    console.warn('ExerciseDB 로드 오류:',e);
    return null;
  }
}

// exercises.json에서 영문명으로 검색 (정확도 우선)
function searchExercise(db, query){
  if(!db||!query) return null;
  const q=query.toLowerCase().trim();
  const words=q.split(' ').filter(w=>w.length>1);

  // 1. 완전 일치
  let found=db.find(e=>e.name.toLowerCase()===q&&e.images?.length>=2);
  if(found) return found;

  // 2. 모든 단어가 포함 + 단어 수 가장 근접한 것 (더 정확한 매칭)
  const candidates=db.filter(e=>{
    if(!e.images||e.images.length<2) return false;
    const en=e.name.toLowerCase();
    return words.every(w=>en.includes(w));
  });
  if(candidates.length>0){
    // 단어 수 차이가 가장 적은 것 선택 (더 정확한 매칭)
    candidates.sort((a,b)=>{
      const aw=a.name.toLowerCase().split(' ').length;
      const bw=b.name.toLowerCase().split(' ').length;
      return Math.abs(aw-words.length)-Math.abs(bw-words.length);
    });
    return candidates[0];
  }

  // 3. 핵심 단어만으로 매칭 (마지막 폴백)
  // 단, 한 단어면 부분 매칭 금지 (오매칭 방지)
  if(words.length>=2){
    found=db.find(e=>{
      if(!e.images||e.images.length<2) return false;
      const en=e.name.toLowerCase();
      return words.some(w=>w.length>3&&en.includes(w));
    });
    return found||null;
  }
  return null;
}

function buildExerciseSVG(name){
  // 스틱 피겨 기반 SVG — 운동별 특화
  const base=name.includes('스쿼트')?sqSVG()
    :name.includes('벤치')?bpSVG()
    :name.includes('데드')?dlSVG()
    :name.includes('풀업')||name.includes('친업')?puSVG()
    :name.includes('플랭크')?plankSVG()
    :name.includes('숄더')||name.includes('오버헤드')||name.includes('프레스')?ohpSVG()
    :defaultSVG();
  return base;
}

function svgWrap(content){

let inbodyPage=0;
const INBODY_PER_PAGE=10;

async function saveInbodyLog(imgDataUrl,analysisText){
  if(!currentUser)return;
  const id='ib'+Date.now();
  const now=new Date();
  await setDoc(uDoc('inbody',id),{
    id, at:now.toISOString(),
    date:makeDateStr(now.getFullYear(),now.getMonth()+1,now.getDate()),
    imgDataUrl:imgDataUrl||null,
    analysis:analysisText||''
  });
}

async function loadInbodyLogs(){
  if(!currentUser)return[];
  try{
    const q=query(uCol('inbody'),orderBy('at','desc'));
    const snap=await getDocs(q);
    return snap.docs.map(d=>d.data());
  }catch(e){console.warn('인바디 로드 오류:',e);return[];}
}

async function deleteInbodyConfirm(id,name){
  showConfirm(name+' 인바디 기록을 삭제할까?',async()=>{
    try{
      await deleteDoc(uDoc('inbody',id));
      renderInbodyTab();
    }catch(e){alert('삭제 실패: '+e.message);}
  });
}

    +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>사진 추가'

        +(log.imgDataUrl?'<img src="'+esc(log.imgDataUrl)+'" style="width:100%;border-radius:10px;margin-bottom:10px;max-height:200px;object-fit:contain;background:var(--s2)" alt="인바디">':'')
        +(log.analysis?'<div style="font-size:12px;line-height:1.7;color:var(--mu2);background:var(--s2);border-radius:8px;padding:10px">'+esc(log.analysis).replace(/\n/g,'<br>')+'</div>':'')

async function handleInbodyFile(e){
  const file=e.target.files?.[0];if(!file)return;
  const b64=await fileToBase64(file);
  const imgDataUrl='data:'+file.type+';base64,'+b64;
  e.target.value='';

  // Firestore에서 직전 인바디 기록 가져오기 (추이 분석용)
  const logs=await loadInbodyLogs();
  const prevAnalysis=logs.length>0?('이전 기록('+logs[0].date+'): '+logs[0].analysis.slice(0,200)):'없음';

  const el=document.getElementById('inbody-tab');
  el.innerHTML='<div style="padding:40px;text-align:center;color:var(--mu)"><div style="font-size:24px;margin-bottom:10px">🔍</div>인바디 분석 중...</div>';

  try{
    const system='당신은 인바디 전문 분석 AI. 인바디 결과지 사진을 보고 주요 수치를 읽어서 분석해줘. 반말로 친근하게. 이전 기록: '+prevAnalysis;
    const prompt='이 인바디 결과지를 분석해줘.\n\n다음 순서로 간결하게 정리해줘:\n1. 주요 수치 (체중/체지방률/골격근량/BMI 등 보이는 것)\n2. 현재 상태 평가 (2~3줄)\n'+(logs.length>0?'3. 이전 기록 대비 변화 및 추이 분석 (2~3줄)\n':'')+'마지막에 한 줄 핵심 조언';
    const reply=await fetchClaude({model:'claude-sonnet-4-5',max_tokens:800,system,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:file.type,data:b64}},
        {type:'text',text:prompt}
      ]}]
    });
    await saveInbodyLog(imgDataUrl,reply);
    await renderInbodyTab();
  }catch(err){
    await saveInbodyLog(imgDataUrl,'분석 실패: '+err.message);
    await renderInbodyTab();
  }
}
window.handleInbodyFile=handleInbodyFile;

function generateNutAlert(kcal,prot,carb,fat,dateStr){
  const goalKcal=GOAL_KCAL(),goalProt=GOAL_PROT(),goalCarb=280,goalFat=70;
  const isToday=dateStr===todayStr();
  const msgs=[];
  if(prot<goalProt*0.6) msgs.push('단백질이 목표의 '+Math.round(prot/goalProt*100)+'%야. 닭가슴살, 달걀, 두부를 추가해봐 🥚');
  else if(prot>=goalProt*0.9) msgs.push('단백질 섭취 훌륭해! 근육 회복에 충분한 단백질을 채웠어 💪');
  if(kcal>goalKcal*1.15) msgs.push('칼로리가 목표보다 '+Math.round(kcal-goalKcal)+'kcal 초과했어. '+(isToday?'저녁은 가볍게 먹어봐 🌙':'이 날은 살짝 초과했네 🌙'));
  else if(kcal<goalKcal*0.5&&(!isToday||new Date().getHours()>=18)) msgs.push('칼로리가 목표의 절반도 안 됐어. '+(isToday?'영양가 있는 식사를 챙겨봐 🍱':'이 날 식사량이 적었네 🍱'));
  const daySession=sessions.find(s=>s.date===dateStr);
  if(daySession&&prot<goalProt*0.7) msgs.push('운동한 날인데 단백질이 부족해. '+Math.round(goalProt-prot)+'g가 더 필요했어 💪');
  if(fat>goalFat*1.3) msgs.push('지방 섭취가 좀 많았어. 튀김류보다 삶거나 구운 음식으로 바꿔봐 🥗');
  if(carb>goalCarb*1.3) msgs.push('탄수화물이 목표보다 많았어. 채소와 단백질 위주로 균형을 맞춰봐 🥦');
  if(kcal===0) return isToday?'오늘 아직 음식 기록이 없어. 채팅에서 음식 사진을 올려봐 📷':'이 날 음식 기록이 없어.';
  return msgs.length>0?msgs[0]:'영양 균형이 좋았어! 이대로 유지해봐 ✨';
}

// ── 운동 탭 ──────────────────────────────────────────────────
function getMonthDates(){
  const now=new Date();const y=now.getFullYear(),m=now.getMonth();
  const days=[];const total=new Date(y,m+1,0).getDate();
  for(let d=1;d<=total;d++){const dt=new Date(y,m,d);days.push(dt.toISOString().split('T')[0]);}
  return days;
}
function groupByWeek(dates){
  const weeks=[];let week=[];
  dates.forEach(d=>{week.push(d);if(new Date(d).getDay()===0||d===dates[dates.length-1]){weeks.push([...week]);week=[];}});
  if(week.length)weeks.push(week);
  return weeks;
}

    // 완료된 날 — 부위·루틴 수정 잠금
    html+='<div style="padding:10px 12px;background:var(--gb);border:1px solid var(--gd);border-radius:10px;margin-bottom:14px;display:flex;align-items:center;gap:8px">'
      +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--gr)" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'
      +'<span style="font-size:12px;color:var(--gr)">운동 완료! 부위·루틴 수정이 잠겼어.</span></div>'
    // 루틴 목록만 읽기 전용으로 표시
    +'<div style="margin-bottom:14px">'
    +routines.map(r=>{
      const isDoneEx=r.doneTime!=null;
      return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--br)">'
        +'<div style="flex:1"><div style="font-size:13px;font-weight:500;color:'+(isDoneEx?'var(--gr)':'var(--mu2)')+'">'+esc(r.name)+'</div>'
        +'<div style="font-size:11px;color:var(--mu);margin-top:2px">'+r.sets+'세트</div></div>'
        +'<div style="text-align:right">'+(isDoneEx?'<span style="font-size:11px;color:var(--gr)">'+fmtSec(r.doneTime)+'</span>':'<span style="font-size:11px;color:var(--mu)">—</span>')+'</div></div>';
    }).join('')
    +'</div>';
  } else {
    // 미완료 날 — 수정 가능
    html+='<div style="margin-bottom:14px"><div style="font-size:10px;color:var(--mu);font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">운동 부위</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:6px">'
      +MUSCLE_LABELS.map(lb=>'<button onclick="setMuscle(\''+dateStr+'\',\''+lb+'\')" style="padding:5px 12px;border-radius:20px;border:1px solid '+(muscle===lb?'var(--bl)':'var(--br)')+';background:'+(muscle===lb?'var(--bb)':'transparent')+';color:'+(muscle===lb?'var(--bl)':'var(--mu)')+';font-size:12px;font-family:inherit">'+lb+'</button>').join('')
      +'</div></div>'
      +'<div style="margin-bottom:14px"><div style="font-size:10px;color:var(--mu);font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">추천 루틴</div>'
      +(routines.length===0?'<div style="font-size:12px;color:var(--mu);padding:12px 0">아직 루틴이 없어. 채팅에서 "'+mm+'월 '+dd+'일 '+(muscle||'')+' 루틴 짜줘"라고 말해봐!</div>':'')
      +routines.map((r,i)=>{
        const isActive=activeExIdx===i&&activeDayKey===dateStr;
        const isDoneEx=r.doneTime!=null;
        return '<div onclick="toggleExercise(\''+dateStr+'\','+i+')" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--br);cursor:pointer">'
          +'<div style="flex:1"><div style="font-size:13px;font-weight:500;color:'+(isDoneEx?'var(--gr)':isActive?'var(--ye)':'var(--tx)')+'">'+esc(r.name)+'</div>'
          +'<div style="font-size:11px;color:var(--mu);margin-top:2px">'+r.sets+'세트'+(r.kg?' · '+r.kg+'kg':'')+'</div></div>'
          +'<div style="text-align:right;flex-shrink:0">'+(isDoneEx?'<span style="font-size:11px;color:var(--gr)">'+fmtSec(r.doneTime)+'</span>':'')+(isActive?'<span style="font-size:11px;color:var(--ye)">진행중</span>':'')+'</div></div>'
          +(isActive?renderSetTimer(r,dateStr,i):'');
      }).join('')
      +'</div>'
      +'<div style="display:flex;gap:8px;margin-bottom:4px">'
      +'<input id="new-ex-name" placeholder="운동 이름" style="flex:1;background:var(--s2);border:1px solid var(--br);border-radius:8px;padding:8px 10px;color:var(--tx);font-size:12px;font-family:inherit;outline:none">'
      +'<input id="new-ex-sets" placeholder="세트" type="number" min="1" style="width:60px;background:var(--s2);border:1px solid var(--br);border-radius:8px;padding:8px 10px;color:var(--tx);font-size:12px;font-family:inherit;outline:none">'
      +'<button onclick="addRoutineItem(\''+dateStr+'\')" style="padding:8px 12px;background:var(--gr);border:none;border-radius:8px;color:#0c0e14;font-size:12px;font-weight:600;font-family:inherit">추가</button>'
      +'</div>';
  }

  html+='</div>';
  panel.innerHTML=html;
}

function renderSetTimer(r,dateStr,idx){
  return '<div style="background:var(--s2);border-radius:10px;padding:12px;margin-top:6px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
    +'<span id="timer-display-'+idx+'" style="font-size:20px;font-weight:700;font-family:\'DM Mono\',monospace;color:var(--ye)">0:00</span>'
    +'<span id="set-count-'+idx+'" style="font-size:13px;color:var(--mu)">'+doneSet+' / '+r.sets+' 세트</span></div>'
    +'<div style="display:flex;gap:8px">'
    +'<button id="start-btn-'+idx+'" onclick="startSet(\''+dateStr+'\','+idx+')" style="flex:1;padding:9px;background:var(--gr);border:none;border-radius:8px;color:#0c0e14;font-size:13px;font-weight:600;font-family:inherit">기록</button>'
    +'<button onclick="endSet(\''+dateStr+'\','+idx+')" style="flex:1;padding:9px;background:var(--s3);border:1px solid var(--br);border-radius:8px;color:var(--tx);font-size:13px;font-family:inherit">종료</button>'
    +'</div></div>';
}

async function setMuscle(dateStr,muscle){
  const plan=monthPlan[dateStr]||{};

  // 완료된 날짜는 수정 불가
  if(plan.done){
    showConfirm('이 날은 운동이 완료됐어. 완료된 날의 기록은 수정할 수 없어.',()=>{},{okText:'확인',cancelHide:true});
    return;
  }

  const hasSameMuscle=plan.muscle===muscle;
  if(hasSameMuscle) return; // 같은 부위 재선택은 무시

  const hasRoutines=(plan.routines||[]).length>0;
  const inProgress=(plan.routines||[]).some(r=>r.doneTime!=null);

  const doChange=async()=>{
    if(!monthPlan[dateStr])monthPlan[dateStr]={muscle:'',routines:[],done:false,totalTime:null};
    monthPlan[dateStr].muscle=muscle;
    monthPlan[dateStr].routines=[]; // 루틴 초기화
    monthPlan[dateStr].done=false;
    monthPlan[dateStr].totalTime=null;
    // 타이머 초기화
    if(activeDayKey===dateStr){clearInterval(setTimer);setTimer=null;activeExIdx=null;doneSet=0;}
    await saveMonthPlan();
    renderDayPanel(dateStr);
    const row=document.getElementById('day-row-'+dateStr);
    if(row){const lb=row.querySelector('.muscle-label');if(lb){lb.textContent=muscle||'미정';lb.style.color=muscle==='휴식'?'var(--mu)':muscle?'var(--bl)':'var(--mu)';}}
  };

  if(inProgress){
    showConfirm(
      '⚠️ 운동이 진행 중이야!\n\n부위를 바꾸면 진행 중인 세트 기록과 추천 루틴이 모두 삭제돼. 정말 바꿀까?',
      doChange,{okText:'바꾸기',okColor:'var(--re)'}
    );
  } else if(hasRoutines){
    showConfirm(
      '"'+muscle+'"(으)로 부위를 바꾸면 기존 루틴이 삭제돼. 계속할까?',
      doChange,{okText:'바꾸기',okColor:'var(--re)'}
    );
  } else {
    await doChange();
  }
}
window.setMuscle=setMuscle;

async function addRoutineItem(dateStr){
  const name=document.getElementById('new-ex-name')?.value.trim();
  const sets=parseInt(document.getElementById('new-ex-sets')?.value)||3;
  if(!name)return;
  if(!monthPlan[dateStr])monthPlan[dateStr]={muscle:'',routines:[],done:false,totalTime:null};
  monthPlan[dateStr].routines.push({name,sets,doneTime:null});
  await saveMonthPlan();renderDayPanel(dateStr);
}
window.addRoutineItem=addRoutineItem;

function toggleExercise(dateStr,idx){
  if(activeExIdx===idx&&activeDayKey===dateStr){clearInterval(setTimer);setTimer=null;activeExIdx=null;activeDayKey=null;doneSet=0;}
  else{clearInterval(setTimer);setTimer=null;activeExIdx=idx;activeDayKey=dateStr;doneSet=0;}
  renderDayPanel(dateStr);
}
window.toggleExercise=toggleExercise;

function startSet(dateStr,idx){
  if(setTimer)return;
  setStart=Date.now();
  const disp=document.getElementById('timer-display-'+idx);
  setTimer=setInterval(()=>{if(disp)disp.textContent=fmtSec(Math.floor((Date.now()-setStart)/1000));},500);
  const btn=document.getElementById('start-btn-'+idx);
  if(btn)btn.disabled=true;
}
window.startSet=startSet;

async function endSet(dateStr,idx){
  clearInterval(setTimer);setTimer=null;
  const elapsed=setStart?Math.floor((Date.now()-setStart)/1000):0;
  setStart=null;doneSet++;
  const plan=monthPlan[dateStr];if(!plan)return;
  const r=plan.routines[idx];if(!r)return;
  r.doneTime=(r.doneTime||0)+elapsed;
  if(doneSet>=r.sets){
    activeExIdx=null;activeDayKey=null;doneSet=0;
    const allDone=plan.routines.length>0&&plan.routines.every(ex=>ex.doneTime!=null);
    if(allDone){plan.done=true;plan.totalTime=plan.routines.reduce((s,ex)=>s+(ex.doneTime||0),0);}
    await saveMonthPlan();renderDayPanel(dateStr);
    if(plan.done){const row=document.getElementById('day-row-'+dateStr);if(row){const div=row.querySelector('div:last-child');if(div&&!div.querySelector('.done-badge')){const badge=document.createElement('span');badge.className='done-badge';badge.style.cssText='font-size:11px;color:var(--gr);font-weight:500';badge.textContent='완료 '+(plan.totalTime?fmtSec(plan.totalTime):'');div.prepend(badge);}}}
  } else {
    const btn=document.getElementById('start-btn-'+idx);const disp=document.getElementById('timer-display-'+idx);const cnt=document.getElementById('set-count-'+idx);
    if(btn)btn.disabled=false;if(disp)disp.textContent='0:00';if(cnt)cnt.textContent=doneSet+' / '+r.sets+' 세트';
  }
}
window.endSet=endSet;

// ── 시작 ─────────────────────────────────────────────────────
bindAuth();
showScreen('screen-login');
</script>
